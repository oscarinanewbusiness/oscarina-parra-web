<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1200px; height: 630px; overflow: hidden; }
.og { width: 1200px; height: 630px; position: relative; overflow: hidden;
  background: linear-gradient(120deg, #FBF9F5 0%, #F3EDE3 55%, #ECE4D6 100%);
  color: #13316B; font-family: 'DM Sans', sans-serif; }
.frame { position: absolute; inset: 22px; border: 1.5px solid #D8BE7A; z-index: 6; pointer-events: none; }
.cutout { position: absolute; right: 40px; bottom: 0; width: 460px; height: 630px;
  background: url('oscarina-sinfondo.png') center bottom / contain no-repeat; z-index: 2; }
.inner { position: absolute; left: 84px; top: 50%; transform: translateY(-50%); z-index: 3; max-width: 640px; }
.head { display: flex; align-items: center; gap: 18px; margin-bottom: 26px; }
.logo { width: 74px; height: 74px; border-radius: 50%; background: url('logo.png') center/86% no-repeat, #fff; flex: none; box-shadow: 0 6px 20px -8px rgba(0,0,0,0.2); }
.name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 84px; line-height: 0.94; letter-spacing: 0.02em; color: #13316B; text-transform: uppercase; }
.role { color: #B8923C; font-weight: 600; font-size: 24px; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 18px; }
.pill { display: inline-block; margin-top: 32px; background: #13316B; color: #fff; font-weight: 600; font-size: 25px; padding: 15px 34px; border-radius: 100px; }
</style>
</head>
<body>
  <div class="og">
    <div class="cutout"></div>
    <div class="inner">
      <div class="head"><div class="logo"></div></div>
      <div class="name">Oscarina<br>Parra</div>
      <div class="role">Agente de Seguros de Salud y Vida</div>
      <div class="pill">oscarinainsurance.com</div>
    </div>
    <div class="frame"></div>
  </div>
</body>
</html>
